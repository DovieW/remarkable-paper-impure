name: Host checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.5 --activate
      - name: Install host tools
        run: sudo apt-get update && sudo apt-get install --yes ripgrep shellcheck
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate without devices or deployment credentials
        run: scripts/host-check.sh
