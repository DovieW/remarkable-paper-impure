name: paperboard

services:
  tailscale:
    image: tailscale/tailscale:stable@sha256:d54b2e6a9c09f0e5ec52e82b9ad4af3d446b54a7c08075e92f11c39dd410105f
    hostname: ${PAPERBOARD_TS_HOSTNAME:-paperboard}
    environment:
      TS_AUTHKEY: ${PAPERBOARD_TS_AUTHKEY:-}
      TS_AUTH_ONCE: "true"
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
    volumes:
      - tailscale-state:/var/lib/tailscale
    ports:
      - "127.0.0.1:${PAPERBOARD_LOCAL_PORT:-8787}:8787"
      - "127.0.0.1:${PAPERBOARD_LOCAL_ADMIN_PORT:-8788}:8788"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 15s
      timeout: 5s
      retries: 10

  relay:
    build:
      context: ../..
      dockerfile: apps/relay/Dockerfile
    network_mode: service:tailscale
    environment:
      PAPERBOARD_HOST: 0.0.0.0
      PAPERBOARD_PORT: 8787
      PAPERBOARD_ADMIN_HOST: 0.0.0.0
      PAPERBOARD_ADMIN_PORT: 8788
      PAPERBOARD_DATA_DIR: /data
      PAPERBOARD_PUBLIC_BASE_URL: ${PAPERBOARD_PUBLIC_BASE_URL:?set the private Tailscale HTTPS URL}
      PAPERBOARD_MASTER_KEY_FILE: /run/secrets/master_key
      PAPERBOARD_ADMIN_TOKEN_FILE: /run/secrets/admin_token
    secrets:
      - master_key
      - admin_token
    volumes:
      - relay-data:/data
    depends_on:
      tailscale:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    group_add:
      - "${PAPERBOARD_SECRET_GID:?set to the host primary group from id -g}"

secrets:
  master_key:
    file: ${PAPERBOARD_MASTER_KEY_FILE:-../../secrets/paperboard-master-key}
  admin_token:
    file: ${PAPERBOARD_ADMIN_TOKEN_FILE:-../../secrets/paperboard-admin-token}

volumes:
  relay-data:
  tailscale-state:
