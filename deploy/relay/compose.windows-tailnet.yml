name: paperboard

services:
  relay:
    build:
      context: ../..
      dockerfile: apps/relay/Dockerfile
    environment:
      PAPERBOARD_HOST: 0.0.0.0
      PAPERBOARD_PORT: 8787
      PAPERBOARD_ADMIN_HOST: 0.0.0.0
      PAPERBOARD_ADMIN_PORT: 8788
      PAPERBOARD_DATA_DIR: /data
      PAPERBOARD_PUBLIC_BASE_URL: ${PAPERBOARD_PUBLIC_BASE_URL:?set the private Windows Tailscale HTTPS URL}
      PAPERBOARD_MASTER_KEY_FILE: /run/secrets/master_key
      PAPERBOARD_ADMIN_TOKEN_FILE: /run/secrets/admin_token
      PAPERBOARD_TABLET_BRIDGE_COMMAND: /usr/local/bin/paperboard-tablet-bridge
      PAPERBOARD_TABLET_SSH_KEY_FILE: /run/secrets/tablet_ssh_key
    ports:
      - "127.0.0.1:${PAPERBOARD_LOCAL_PORT:-8787}:8787"
      - "127.0.0.1:${PAPERBOARD_LOCAL_ADMIN_PORT:-8788}:8788"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    secrets:
      - master_key
      - admin_token
      - tablet_ssh_key
    volumes:
      - relay-data:/data
      - ${PAPERBOARD_TABLET_SSH_DIR:?set restricted SSH directory}:/app/.ssh:ro
      - ${PAPERBOARD_TABLET_BRIDGE_CONFIG:?set bridge config path}:/etc/paperboard/tablet-bridge.conf:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    group_add:
      - "${PAPERBOARD_SECRET_GID:?set to the host primary group from id -g}"

secrets:
  master_key:
    file: ${PAPERBOARD_MASTER_KEY_FILE:-../../secrets/paperboard-master-key}
  admin_token:
    file: ${PAPERBOARD_ADMIN_TOKEN_FILE:-../../secrets/paperboard-admin-token}
  tablet_ssh_key:
    file: ${PAPERBOARD_TABLET_SSH_KEY_FILE:?set restricted tablet SSH key file}

volumes:
  relay-data:
