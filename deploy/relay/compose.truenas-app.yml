services:
  relay:
    image: __PAPERBOARD_IMAGE__
    env_file:
      - __PAPERBOARD_DATASET__/config/relay.env
    environment:
      PAPERBOARD_HOST: 0.0.0.0
      PAPERBOARD_PORT: 8787
      PAPERBOARD_ADMIN_HOST: 0.0.0.0
      PAPERBOARD_ADMIN_PORT: 8788
      PAPERBOARD_DATA_DIR: /data
      PAPERBOARD_MASTER_KEY_FILE: /run/paperboard-secrets/master_key
      PAPERBOARD_ADMIN_TOKEN_FILE: /run/paperboard-secrets/admin_token
      PAPERBOARD_TABLET_BRIDGE_COMMAND: /usr/local/bin/paperboard-tablet-bridge
      PAPERBOARD_TABLET_SSH_KEY_FILE: /run/paperboard-secrets/tablet_ssh_key
    ports:
      - "127.0.0.1:8787:8787"
      - "127.0.0.1:8788:8788"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - __PAPERBOARD_DATASET__/data:/data
      - __PAPERBOARD_DATASET__/ssh:/app/.ssh:ro
      - __PAPERBOARD_DATASET__/config/tablet-bridge.conf:/etc/paperboard/tablet-bridge.conf:ro
      - __PAPERBOARD_DATASET__/secrets:/run/paperboard-secrets:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
